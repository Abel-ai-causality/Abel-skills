interface:
  display_name: "Causal Abel"
  short_description: "Use for causal graph questions and off-graph decisions that should be routed through Abel market proxies."
  default_prompt: >
    Use $causal-abel when the user asks what is driving a node, how one node
    reaches another, what changes under intervention, or an off-graph decision
    that should be routed through Abel market proxies. Run graph-first, use
    web grounding when freshness or real-world mechanism matters, and treat
    intervention as a pressure test rather than a default flourish. Keep the
    visible answer in Abel style: verdict first, causal link second,
    tickers out of user-facing prose, and a compact full report for non-trivial
    analyses.
