interface:
  display_name: "Causal Abel"
  short_description: "Use for causal graph questions and off-graph decisions that should be routed through Abel market proxies."
  default_prompt: >
    Use $causal-abel when the user asks what is driving a node, how one node
    reaches another, what changes under intervention, or an off-graph decision
    that should be routed through Abel market proxies. Run graph-first, then
    web-grounded validation, then a short red-team pass before finalizing.
    Treat intervention as a pressure-test or next-step probe, not as a default
    flourish. Follow the SKILL and report-guide rendering rules: build a
    semantic render_map from the final shortlist, run
    `extensions.abel.node_description` before writing, and run
    `scripts/render_guard.py` on visible prose before finalizing. For
    proxy-routed or broad-macro questions, raw tickers, raw node ids, and
    signed prediction decimals in visible prose are a rewrite condition, not a
    stylistic preference. Only keep a ticker in the verdict when the user
    explicitly asked about that named asset. Use a compact full report for
    non-trivial analyses. Prefer
    `extensions.abel.observe_predict_resolved_time`
    for observational reads and `extensions.abel.intervene_time_lag` for
    pressure tests. Before any live Abel CAP or business API call, check
    whether an Abel API key is already present in session state, `--api-key`,
    or `.env.skill`. If no key is present, stop and follow
    `references/setup-guide.md` to complete the Abel agent OAuth handoff before
    any live API usage.
