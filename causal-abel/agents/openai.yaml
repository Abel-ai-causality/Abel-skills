interface:
  display_name: "Causal Abel"
  short_description: "Use for causal graph questions and off-graph decisions that should be routed through Abel market proxies."
  default_prompt: >
    Use $causal-abel for Abel, causal, driver, path, or what-if questions about
    market, business, or crypto nodes, and for off-graph decisions that should
    be routed through Abel market proxies. Default to graph-first, verdict-first
    answers. Use web grounding only when freshness or real-world validation is
    actually required.
