name: Sync ClawHub Artifact

on:
  push:
    branches:
      - main
    paths:
      - "causal-abel/**"
      - "scripts/build_clawhub_release.py"
      - ".github/workflows/sync-clawhub-artifact.yml"

permissions:
  contents: write

jobs:
  sync-clawhub-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build committed ClawHub artifact
        run: python3 scripts/build_clawhub_release.py --output-root clawhub

      - name: Detect artifact changes
        id: detect_changes
        run: |
          if git diff --quiet -- clawhub/causal-abel; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated artifact
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clawhub/causal-abel
          git commit -m "Sync ClawHub artifact"
          git push
