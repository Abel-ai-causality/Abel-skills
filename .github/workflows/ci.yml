name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest ruff

      - name: Lint Python
        run: ruff check causal-abel/scripts/ maintainers/causal-abel/ scripts/ tests/

      - name: Run tests (smoke + structural + endpoint isolation)
        run: python3 -m pytest tests/ -v
